version: "3.9"

# SEO Command — full production stack
#
# Quick start (bundled postgres):
#   cp .env.example .env    # fill in SESSION_SECRET, ADMIN_PASSWORD, DB_PASSWORD
#   docker compose up -d --build
#
# Quick start (external / Supabase postgres):
#   cp .env.example .env    # set SUPABASE_DATABASE_URL, SESSION_SECRET, ADMIN_PASSWORD
#   docker compose --profile external-db up -d --build

services:

  # ── PostgreSQL (bundled, default) ──────────────────────────────────────────
  # Skip this service by using --profile external-db when SUPABASE_DATABASE_URL is set.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["", "bundled-db"]
    environment:
      POSTGRES_DB:       seocommand
      POSTGRES_USER:     seocommand
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U seocommand -d seocommand"]
      interval: 5s
      timeout:  5s
      retries:  12

  # ── Application (nginx + node in one container) ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_PATH: /
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
        required: false
    environment:
      NODE_ENV: production
      PORT:     "8080"

      # ── Database ────────────────────────────────────────────────────────────
      # Option A (bundled postgres): leave SUPABASE_DATABASE_URL blank
      DATABASE_URL:          postgres://seocommand:${DB_PASSWORD:-changeme_in_env}@db:5432/seocommand
      PGHOST:                db
      PGPORT:                "5432"
      PGUSER:                seocommand
      PGPASSWORD:            ${DB_PASSWORD:-changeme_in_env}
      PGDATABASE:            seocommand
      # Option B (external / Supabase): set SUPABASE_DATABASE_URL and leave DB_PASSWORD blank.
      # When set, DATABASE_URL / PGHOST above are ignored by the app.
      SUPABASE_DATABASE_URL: ${SUPABASE_DATABASE_URL:-}

      # ── Auth (required) ──────────────────────────────────────────────────────
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # ── App URL ─────────────────────────────────────────────────────────────
      APP_URL: ${APP_URL:-}

      # ── AI provider ─────────────────────────────────────────────────────────
      OPENAI_API_KEY:                  ${OPENAI_API_KEY:-}
      AI_INTEGRATIONS_OPENAI_API_KEY:  ${OPENAI_API_KEY:-}
      AI_INTEGRATIONS_OPENAI_BASE_URL: https://api.openai.com/v1

      # ── Google ───────────────────────────────────────────────────────────────
      GOOGLE_CLIENT_ID:         ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:     ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI:      ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_PAGESPEED_API_KEY: ${GOOGLE_PAGESPEED_API_KEY:-}

      # ── Social OAuth ────────────────────────────────────────────────────────
      TWITTER_CLIENT_ID:     ${TWITTER_CLIENT_ID:-}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET:-}
      LINKEDIN_CLIENT_ID:    ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      FACEBOOK_APP_ID:       ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET:   ${FACEBOOK_APP_SECRET:-}

      # ── Email ────────────────────────────────────────────────────────────────
      EMAIL_ENCRYPTION_KEY:        ${EMAIL_ENCRYPTION_KEY:-}
      SENDGRID_WEBHOOK_KEY:        ${SENDGRID_WEBHOOK_KEY:-}
      MAILGUN_WEBHOOK_SIGNING_KEY: ${MAILGUN_WEBHOOK_SIGNING_KEY:-}

      # ── Image generation ─────────────────────────────────────────────────────
      FAL_AI_API_KEY: ${FAL_AI_API_KEY:-}
      FAL_KEY:        ${FAL_AI_API_KEY:-}

    ports:
      - "${HOST_PORT:-80}:80"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
