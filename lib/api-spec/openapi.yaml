openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SEO & Marketing Hub API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: websites
    description: Website portfolio management
  - name: keywords
    description: SEO keyword tracking
  - name: social-posts
    description: Social media posts management
  - name: campaigns
    description: Campaign management
  - name: backlinks
    description: Backlink opportunity tracking
  - name: leads
    description: Lead generation tracking
  - name: analytics
    description: Analytics and dashboard aggregates
  - name: ai
    description: AI-powered content generation
  - name: media-assets
    description: Media asset library (AI-generated images and videos)
  - name: settings
    description: Application settings
  - name: sequences
    description: Email nurture sequence management
  - name: lead-forms
    description: Embeddable lead capture form management
  - name: billing
    description: Plan and usage billing information
  - name: competitors
    description: AI-powered competitor domain analysis
  - name: site-audit
    description: Full-site technical SEO crawler
  - name: integrations
    description: Third-party integrations (Google Search Console, etc.)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Websites ────────────────────────────────────────────────────────────────
  /websites:
    get:
      operationId: listWebsites
      tags: [websites]
      summary: List all websites
      responses:
        "200":
          description: List of websites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Website"
    post:
      operationId: createWebsite
      tags: [websites]
      summary: Create a website
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebsiteBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"

  /websites/{id}:
    get:
      operationId: getWebsite
      tags: [websites]
      summary: Get a website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Website
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"
        "404":
          description: Not found
    patch:
      operationId: updateWebsite
      tags: [websites]
      summary: Update a website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWebsiteBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"
    delete:
      operationId: deleteWebsite
      tags: [websites]
      summary: Delete a website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Keywords ─────────────────────────────────────────────────────────────────
  /keywords:
    get:
      operationId: listKeywords
      tags: [keywords]
      summary: List keywords, optionally filtered by website
      parameters:
        - name: websiteId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of keywords
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Keyword"
    post:
      operationId: createKeyword
      tags: [keywords]
      summary: Add a tracked keyword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeywordBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"

  /keywords/{id}:
    patch:
      operationId: updateKeyword
      tags: [keywords]
      summary: Update a keyword entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKeywordBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"
    delete:
      operationId: deleteKeyword
      tags: [keywords]
      summary: Delete a keyword
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /keywords/{id}/history:
    get:
      operationId: getKeywordRankHistory
      tags: [keywords]
      summary: Get rank history for a keyword
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: days
          in: query
          schema:
            type: integer
          description: Number of days of history to return (default 90)
      responses:
        "200":
          description: Rank history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KeywordRankHistory"
        "404":
          description: Keyword not found

  /keywords/research:
    post:
      operationId: researchKeywords
      tags: [keywords]
      summary: AI-powered keyword research — discover related keywords from a seed input
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeywordResearchBody"
      responses:
        "200":
          description: Keyword research results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordResearchResponse"
        "400":
          description: Bad request
        "429":
          description: AI usage limit reached
        "503":
          description: AI unavailable

  /keywords/research/history:
    get:
      operationId: getKeywordResearchHistory
      tags: [keywords]
      summary: Get the last 5 keyword research sessions for the current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Research history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KeywordResearchSession"

  /keywords/trends:
    get:
      operationId: getKeywordTrends
      tags: [keywords]
      summary: Get bulk rank history for all tracked keywords (for trend chart)
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: query
          schema:
            type: integer
          description: Filter by website (omit for all websites)
        - name: days
          in: query
          schema:
            type: integer
          description: Number of days of history to return (default 30, max 90)
      responses:
        "200":
          description: Bulk keyword trend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordTrendsResponse"

  /keywords/rank-alerts:
    get:
      operationId: getKeywordRankAlerts
      tags: [keywords]
      summary: Get keywords that moved 5+ positions in the last 7 days
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: query
          schema:
            type: integer
          description: Filter by website
      responses:
        "200":
          description: Keywords with significant rank changes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordRankAlertsResponse"

  # ─── Local SEO ─────────────────────────────────────────────────────────────────
  /local-seo/keywords:
    post:
      operationId: generateLocalSeoKeywords
      tags: [local-seo]
      summary: AI-powered local keyword suggestions for a topic and location
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocalSeoKeywordsBody"
      responses:
        "200":
          description: Local keyword suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalSeoKeywordsResponse"
        "400":
          description: Bad request
        "429":
          description: AI usage limit reached
        "503":
          description: AI unavailable

  # ─── Competitors ──────────────────────────────────────────────────────────────
  /competitors/analyse:
    post:
      operationId: runCompetitorAnalysis
      tags: [competitors]
      summary: AI-powered competitor domain analysis — domain overview, keyword themes, content topics, and gap opportunities
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyseCompetitorBody"
      responses:
        "200":
          description: Competitor analysis result (may be from 24h cache)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorAnalysisResult"
        "400":
          description: Bad request
        "429":
          description: AI usage limit reached
        "503":
          description: AI unavailable

  /competitors/history:
    get:
      operationId: getCompetitorHistory
      tags: [competitors]
      summary: Get the last 5 competitor domains analysed by the current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Competitor research history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompetitorHistoryItem"

  # ─── Google / GSC Integration ────────────────────────────────────────────────
  /integrations/google/auth:
    get:
      operationId: initiateGoogleAuth
      tags: [integrations]
      summary: Get the Google OAuth authorization URL — frontend fetches this (with Bearer token) then navigates the browser to the returned URL
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Google OAuth URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  authUrl:
                    type: string
                required: [authUrl]
        "400":
          description: Missing websiteId
        "503":
          description: Google OAuth not configured

  /integrations/google/status/{websiteId}:
    get:
      operationId: getGoogleIntegrationStatus
      tags: [integrations]
      summary: Check whether Google Search Console is connected for a website
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscStatus"

  /integrations/google/properties/{websiteId}:
    get:
      operationId: listGscProperties
      tags: [integrations]
      summary: List Google Search Console properties available for the connected account
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of GSC properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GscProperty"
        "404":
          description: Google not connected for this website

  /integrations/google/properties/connect:
    post:
      operationId: connectGscProperty
      tags: [integrations]
      summary: Link a specific GSC property to a website
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GscConnectBody"
      responses:
        "200":
          description: Property linked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  propertyUrl:
                    type: string
        "400":
          description: Missing parameters
        "404":
          description: Google not connected

  /integrations/google/disconnect/{websiteId}:
    delete:
      operationId: disconnectGoogleIntegration
      tags: [integrations]
      summary: Disconnect Google Search Console from a website
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disconnected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /integrations/google/keywords-sync/{websiteId}:
    post:
      operationId: syncKeywordRanksFromGsc
      tags: [integrations]
      summary: Pull live keyword positions from Google Search Console and update tracked keyword ranks
      description: Matches each tracked keyword against GSC search query data for the last 28 days and updates currentRank + writes to rank history. Requires GSC to be connected for this website.
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscKeywordsSyncResponse"
        "400":
          description: No GSC property selected
        "404":
          description: Google not connected for this website
        "502":
          description: GSC API error

  /integrations/google/gsc/{websiteId}:
    get:
      operationId: getGscSearchPerformance
      tags: [integrations]
      summary: Get Google Search Console search performance data for a website
      description: Returns cached data (TTL 1 hour). Queries, pages, summary metrics and position distribution for the chosen date range.
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: path
          required: true
          schema:
            type: integer
        - name: dateRange
          in: query
          schema:
            type: string
            enum: [7days, 28days, 90days]
          description: Date range for the report (default 28days)
        - name: refresh
          in: query
          schema:
            type: boolean
          description: "When true, bypass the 1-hour cache and fetch fresh data from GSC"
      responses:
        "200":
          description: Search performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscSearchPerformance"
        "400":
          description: No property selected
        "404":
          description: Google not connected
        "502":
          description: GSC API error

  /integrations/google/ga4/{websiteId}/property:
    post:
      operationId: setGa4Property
      tags: [integrations]
      summary: Save the GA4 Property ID for a website
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Ga4SetPropertyBody"
      responses:
        "200":
          description: Property ID saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  ga4PropertyId:
                    type: string
                    nullable: true
        "404":
          description: Google not connected

  /integrations/google/ga4/{websiteId}:
    get:
      operationId: getGa4Report
      tags: [integrations]
      summary: Fetch GA4 analytics report for a website
      description: Returns sessions, users, bounce rate, session duration, top pages, traffic sources, and device breakdown.
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: path
          required: true
          schema:
            type: integer
        - name: dateRange
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
          description: Convenience date range shorthand (default 30d). Ignored when startDate is provided.
        - name: startDate
          in: query
          schema:
            type: string
          description: Explicit start date in YYYY-MM-DD format. Takes precedence over dateRange.
        - name: endDate
          in: query
          schema:
            type: string
          description: Explicit end date in YYYY-MM-DD format (default today). Only used when startDate is also provided.
        - name: refresh
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Pass "true" to bypass the server-side cache and force a fresh fetch from GA4.
      responses:
        "200":
          description: GA4 report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ga4ReportData"
        "400":
          description: No GA4 property configured or invalid dateRange
        "404":
          description: Google not connected
        "502":
          description: GA4 API error

  # ─── Site Audit ───────────────────────────────────────────────────────────────
  /audit/site/{websiteId}:
    post:
      operationId: startSiteAudit
      tags: [site-audit]
      summary: Start a full-site background crawl audit
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Crawl started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteAuditStatus"
        "400":
          description: Bad request
        "404":
          description: Website not found
        "409":
          description: Crawl already in progress

  /audit/site/{websiteId}/status:
    get:
      operationId: getSiteAuditStatus
      tags: [site-audit]
      summary: Get current crawl progress for a website's latest audit
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteAuditStatus"
        "404":
          description: No audit found for this website

  /audit/site/{websiteId}/results:
    get:
      operationId: getSiteAuditResults
      tags: [site-audit]
      summary: Get results of the latest site audit (partial or complete)
      description: |
        Returns crawl results for the most recent audit for this website,
        regardless of completion state. When `status` is `crawling` or `queued`,
        the response contains partial data accumulated so far — `pages` and `issues`
        reflect what has been crawled to date. Callers should re-poll until
        `status` equals `complete` or `failed` to obtain final results.
      security:
        - BearerAuth: []
      parameters:
        - name: websiteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit results (may be partial if crawl is still in progress; check `status` field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteAuditResults"
        "404":
          description: No audit found for this website

  /admin/staff/{id}/plan:
    patch:
      operationId: updateStaffUserPlan
      tags: [admin]
      summary: Change the billing plan for any staff user (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [starter, growth, agency]
      responses:
        "200":
          description: Updated staff user with new plan
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  role:
                    type: string
                  plan:
                    type: string
                    enum: [starter, growth, agency]
                  createdAt:
                    type: string
        "400":
          description: Invalid plan value
        "401":
          description: Unauthorized (admin only)
        "404":
          description: User not found

  /admin/keywords/snapshot:
    post:
      operationId: snapshotKeywordRanks
      tags: [admin]
      summary: Capture a rank snapshot for all tracked keywords now (admin only)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Snapshot result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotKeywordsResponse"
        "401":
          description: Unauthorized (admin only)

  /admin/lead-scoring-config:
    get:
      operationId: getLeadScoringConfig
      tags: [admin]
      summary: Get the current lead scoring weights (admin only)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current lead scoring configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadScoringConfig"
        "401":
          description: Unauthorized (admin only)
    patch:
      operationId: updateLeadScoringConfig
      tags: [admin]
      summary: Update lead scoring weights (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadScoringConfig"
      responses:
        "200":
          description: Updated lead scoring configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadScoringConfig"
        "401":
          description: Unauthorized (admin only)

  /admin/leads/recalculate-scores:
    post:
      operationId: recalculateLeadScores
      tags: [admin]
      summary: Recalculate scores for all leads using current weights (admin only)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Recalculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalculateScoresResponse"
        "401":
          description: Unauthorized (admin only)

  # ─── Social Posts ─────────────────────────────────────────────────────────────
  /social-posts:
    get:
      operationId: listSocialPosts
      tags: [social-posts]
      summary: List social posts
      parameters:
        - name: websiteId
          in: query
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of social posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialPost"
    post:
      operationId: createSocialPost
      tags: [social-posts]
      summary: Create a social post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSocialPostBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialPost"

  /social-posts/{id}:
    patch:
      operationId: updateSocialPost
      tags: [social-posts]
      summary: Update a social post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSocialPostBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialPost"
    delete:
      operationId: deleteSocialPost
      tags: [social-posts]
      summary: Delete a social post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Email Templates ─────────────────────────────────────────────────────────
  /email-templates:
    get:
      operationId: listEmailTemplates
      tags: [campaigns]
      summary: List email templates
      parameters:
        - name: websiteId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of email templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailTemplate"
    post:
      operationId: createEmailTemplate
      tags: [campaigns]
      summary: Create an email template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmailTemplateBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"

  /email-templates/{id}:
    patch:
      operationId: updateEmailTemplate
      tags: [campaigns]
      summary: Update an email template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmailTemplateBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
    delete:
      operationId: deleteEmailTemplate
      tags: [campaigns]
      summary: Delete an email template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Campaigns ────────────────────────────────────────────────────────────────
  /campaigns:
