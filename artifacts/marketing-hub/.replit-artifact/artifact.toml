kind = "web"
previewPath = "/"
title = "SEO & Marketing Hub"
version = "1.0.0"
id = "artifacts/marketing-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25168

[services.development]
run = "pnpm --filter @workspace/marketing-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marketing-hub", "run", "build" ]
publicDir = "artifacts/marketing-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25168"
BASE_PATH = "/"
