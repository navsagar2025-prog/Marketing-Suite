components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Website ─────────────────────────────────────────────────────────────
    Website:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        niche:
          type: string
        seoScore:
          type: ["integer", "null"]
        status:
          type: string
          description: active | inactive
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - url
        - niche
        - status
        - createdAt
        - updatedAt

    CreateWebsiteBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
          description: Auto-inferred from URL if not provided
        url:
          type: string
        niche:
          type: ["string", "null"]
          description: Auto-inferred from URL if not provided
        seoScore:
          type: ["integer", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
      required:
        - url
        - status

    UpdateWebsiteBody:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        niche:
          type: string
        seoScore:
          type: ["integer", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]

    # ─── Keyword ─────────────────────────────────────────────────────────────
    Keyword:
      type: object
      properties:
        id:
          type: integer
        websiteId:
          type: integer
        keyword:
          type: string
        currentRank:
          type: ["integer", "null"]
        searchVolume:
          type: ["integer", "null"]
        difficulty:
          type: ["integer", "null"]
        status:
          type: string
          description: tracking | paused
        notes:
          type: ["string", "null"]
        cluster:
          type: ["string", "null"]
          description: Topic cluster name assigned to this keyword
        intent:
          type: ["string", "null"]
          enum: ["informational", "commercial", "navigational", "transactional", null]
          description: "Search intent: informational | commercial | navigational | transactional"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - websiteId
        - keyword
        - status
        - createdAt
        - updatedAt

    CreateKeywordBody:
      type: object
      properties:
        websiteId:
          type: integer
        keyword:
          type: string
        currentRank:
          type: ["integer", "null"]
        searchVolume:
          type: ["integer", "null"]
        difficulty:
          type: ["integer", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
      required:
        - websiteId
        - keyword
        - status

    UpdateKeywordBody:
      type: object
      properties:
        keyword:
          type: string
        currentRank:
          type: ["integer", "null"]
        searchVolume:
          type: ["integer", "null"]
        difficulty:
          type: ["integer", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
        cluster:
          type: ["string", "null"]
        intent:
          type: ["string", "null"]
          enum: ["informational", "commercial", "navigational", "transactional", null]

    KeywordRankHistory:
      type: object
      properties:
        id:
          type: integer
        keywordId:
          type: integer
        rank:
          type: ["integer", "null"]
        recordedDate:
          type: string
          description: ISO date string (YYYY-MM-DD)
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - keywordId
        - recordedDate
        - createdAt

    SnapshotKeywordsResponse:
      type: object
      properties:
        snapshotted:
          type: integer
          description: Number of keywords successfully snapshotted
        skipped:
          type: integer
          description: Number of keywords skipped because they already have a snapshot today
        failed:
          type: integer
          description: Number of keywords that encountered a database error during snapshotting
        date:
          type: string
          description: Date of the snapshot (YYYY-MM-DD)
      required:
        - snapshotted
        - skipped
        - failed
        - date

    KeywordTrendPoint:
      type: object
      properties:
        recordedDate:
          type: string
          description: ISO date string (YYYY-MM-DD)
        rank:
          type: ["integer", "null"]
      required:
        - recordedDate

    KeywordTrendEntry:
      type: object
      properties:
        id:
          type: integer
        keyword:
          type: string
        websiteId:
          type: integer
        history:
          type: array
          items:
            $ref: "#/components/schemas/KeywordTrendPoint"
      required:
        - id
        - keyword
        - websiteId
        - history

    KeywordTrendsResponse:
      type: object
      properties:
        keywords:
          type: array
          items:
            $ref: "#/components/schemas/KeywordTrendEntry"
      required:
        - keywords

    KeywordRankAlert:
      type: object
      properties:
        id:
          type: integer
        keyword:
          type: string
        websiteId:
          type: integer
        currentRank:
          type: ["integer", "null"]
        previousRank:
          type: ["integer", "null"]
        delta:
          type: integer
          description: Positive = moved up (improved), negative = moved down (worsened)
        direction:
          type: string
          enum: [up, down]
      required:
        - id
        - keyword
        - websiteId
        - delta
        - direction

    KeywordRankAlertsResponse:
      type: object
      properties:
        dropped:
          type: array
          items:
            $ref: "#/components/schemas/KeywordRankAlert"
          description: Keywords that dropped 5+ positions
        rising:
          type: array
          items:
            $ref: "#/components/schemas/KeywordRankAlert"
          description: Keywords that rose 5+ positions
      required:
        - dropped
        - rising

    GscKeywordsSyncResponse:
      type: object
      properties:
        updated:
          type: integer
          description: Keywords whose rank was updated from GSC data
        notFound:
          type: integer
          description: Keywords with no matching GSC query
        total:
          type: integer
          description: Total tracked keywords for this website
        date:
          type: string
          description: Date of the sync (YYYY-MM-DD)
      required:
        - updated
        - notFound
        - total
        - date

    # ─── SocialPost ───────────────────────────────────────────────────────────
    SocialPost:
      type: object
      properties:
        id:
          type: integer
        websiteId:
          type: integer
        platform:
          type: string
          description: facebook | instagram | twitter | linkedin | youtube
        content:
          type: string
        status:
          type: string
          description: draft | scheduled | published
        scheduledAt:
          type: ["string", "null"]
          format: date-time
        publishedAt:
          type: ["string", "null"]
          format: date-time
        mediaUrl:
          type: ["string", "null"]
        campaignId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - websiteId
        - platform
        - content
        - status
        - createdAt
        - updatedAt

    CreateSocialPostBody:
