apiVersion: v1
kind: Secret
metadata:
  name: seocommand-secrets
  namespace: seocommand
type: Opaque
stringData:
  # ── REQUIRED ──────────────────────────────────────────────────────────────
  # Generate: openssl rand -hex 32
  SESSION_SECRET: "CHANGE_ME_generate_with_openssl_rand_hex_32"
  ADMIN_PASSWORD: "CHANGE_ME_strong_admin_password"

  # ── Database ──────────────────────────────────────────────────────────────
  # Option A — bundled postgres (matches postgres StatefulSet below)
  DATABASE_URL: "postgres://seocommand:CHANGE_ME_db_password@seocommand-postgres:5432/seocommand"
  DB_PASSWORD: "CHANGE_ME_db_password"

  # Option B — external / Supabase (leave DATABASE_URL blank if using this)
  # SUPABASE_DATABASE_URL: "postgresql://postgres.REF:PASS@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres"
  SUPABASE_DATABASE_URL: ""

  # ── Optional ──────────────────────────────────────────────────────────────
  OPENAI_API_KEY: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GOOGLE_REDIRECT_URI: ""
  GOOGLE_PAGESPEED_API_KEY: ""
  TWITTER_CLIENT_ID: ""
  TWITTER_CLIENT_SECRET: ""
  LINKEDIN_CLIENT_ID: ""
  LINKEDIN_CLIENT_SECRET: ""
  FACEBOOK_APP_ID: ""
  FACEBOOK_APP_SECRET: ""
  EMAIL_ENCRYPTION_KEY: ""
  FAL_AI_API_KEY: ""
