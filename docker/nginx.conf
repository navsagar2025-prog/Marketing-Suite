server {
    listen 80;
    server_name _;

    # Serve the built Vite SPA
    root  /var/www/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── API reverse proxy ──────────────────────────────────────────────────
    # All /api/* requests are forwarded to the Node.js backend on port 8080.
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow streaming responses (AI chat, SSE)
        proxy_buffering    off;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # ── UTM shortlink redirects ────────────────────────────────────────────
    location /r/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static assets — long-term immutable cache ──────────────────────────
    # Vite hashes filenames in production, so 1-year cache is safe.
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires            1y;
        add_header         Cache-Control "public, immutable";
        try_files          $uri =404;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    # Every other path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
