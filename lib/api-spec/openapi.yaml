          type: string
        currentRank:
          type: ["integer", "null"]
        searchVolume:
          type: ["integer", "null"]
        difficulty:
          type: ["integer", "null"]
        status:
          type: string
          description: tracking | paused
        notes:
          type: ["string", "null"]
        cluster:
          type: ["string", "null"]
          description: Topic cluster name assigned to this keyword
        intent:
          type: ["string", "null"]
          enum: ["informational", "commercial", "navigational", "transactional", null]
          description: "Search intent: informational | commercial | navigational | transactional"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - websiteId
        - keyword
        - status
        - createdAt
        - updatedAt

    CreateKeywordBody:
      type: object
      properties:
        websiteId:
          type: integer
        keyword:
          type: string
        currentRank:
          type: ["integer", "null"]
        searchVolume:
          type: ["integer", "null"]
        difficulty:
          type: ["integer", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
      required:
        - websiteId
        - keyword
        - status

    UpdateKeywordBody:
      type: object
      properties:
        keyword:
          type: string
        currentRank:
          type: ["integer", "null"]
        searchVolume:
          type: ["integer", "null"]
        difficulty:
          type: ["integer", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
