openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SEO & Marketing Hub API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: websites
    description: Website portfolio management
  - name: keywords
    description: SEO keyword tracking
  - name: social-posts
    description: Social media posts management
  - name: campaigns
    description: Campaign management
  - name: backlinks
    description: Backlink opportunity tracking
  - name: leads
    description: Lead generation tracking
  - name: analytics
    description: Analytics and dashboard aggregates
  - name: ai
    description: AI-powered content generation
  - name: media-assets
    description: Media asset library (AI-generated images and videos)
  - name: settings
    description: Application settings
  - name: sequences
    description: Email nurture sequence management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Websites ────────────────────────────────────────────────────────────────
  /websites:
    get:
      operationId: listWebsites
      tags: [websites]
      summary: List all websites
      responses:
        "200":
          description: List of websites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Website"
    post:
      operationId: createWebsite
      tags: [websites]
      summary: Create a website
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebsiteBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"

  /websites/{id}:
    get:
      operationId: getWebsite
      tags: [websites]
      summary: Get a website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Website
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"
        "404":
          description: Not found
    patch:
      operationId: updateWebsite
      tags: [websites]
      summary: Update a website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWebsiteBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"
    delete:
      operationId: deleteWebsite
      tags: [websites]
      summary: Delete a website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Keywords ─────────────────────────────────────────────────────────────────
  /keywords:
    get:
      operationId: listKeywords
      tags: [keywords]
      summary: List keywords, optionally filtered by website
      parameters:
        - name: websiteId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of keywords
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Keyword"
    post:
      operationId: createKeyword
      tags: [keywords]
      summary: Add a tracked keyword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeywordBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"

  /keywords/{id}:
    patch:
      operationId: updateKeyword
      tags: [keywords]
      summary: Update a keyword entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKeywordBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"
    delete:
      operationId: deleteKeyword
      tags: [keywords]
      summary: Delete a keyword
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /keywords/{id}/history:
    get:
      operationId: getKeywordRankHistory
      tags: [keywords]
      summary: Get rank history for a keyword
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: days
          in: query
          schema:
            type: integer
          description: Number of days of history to return (default 90)
      responses:
        "200":
          description: Rank history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KeywordRankHistory"
        "404":
          description: Keyword not found

  /admin/keywords/snapshot:
    post:
      operationId: snapshotKeywordRanks
      tags: [admin]
      summary: Capture a rank snapshot for all tracked keywords now (admin only)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Snapshot result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotKeywordsResponse"
        "401":
          description: Unauthorized (admin only)

  /admin/lead-scoring-config:
    get:
      operationId: getLeadScoringConfig
      tags: [admin]
      summary: Get the current lead scoring weights (admin only)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current lead scoring configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadScoringConfig"
        "401":
          description: Unauthorized (admin only)
    patch:
      operationId: updateLeadScoringConfig
      tags: [admin]
      summary: Update lead scoring weights (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadScoringConfig"
      responses:
        "200":
          description: Updated lead scoring configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadScoringConfig"
        "401":
          description: Unauthorized (admin only)

  /admin/leads/recalculate-scores:
    post:
      operationId: recalculateLeadScores
      tags: [admin]
      summary: Recalculate scores for all leads using current weights (admin only)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Recalculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalculateScoresResponse"
        "401":
          description: Unauthorized (admin only)

  # ─── Social Posts ─────────────────────────────────────────────────────────────
  /social-posts:
    get:
      operationId: listSocialPosts
      tags: [social-posts]
      summary: List social posts
      parameters:
        - name: websiteId
          in: query
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of social posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialPost"
    post:
      operationId: createSocialPost
      tags: [social-posts]
      summary: Create a social post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSocialPostBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialPost"

  /social-posts/{id}:
    patch:
      operationId: updateSocialPost
      tags: [social-posts]
      summary: Update a social post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSocialPostBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialPost"
    delete:
      operationId: deleteSocialPost
      tags: [social-posts]
      summary: Delete a social post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Campaigns ────────────────────────────────────────────────────────────────
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: websiteId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /campaigns/{id}/send:
    post:
      operationId: sendCampaignEmail
      tags: [campaigns]
      summary: Send campaign email to leads
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendCampaignEmailBody"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendCampaignEmailResponse"
        "422":
          description: No email provider configured or no matching recipients

  /campaigns/{id}/recipients:
    get:
      operationId: getCampaignRecipients
      tags: [campaigns]
      summary: Preview recipient count for a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: statuses
          in: query
          schema:
            type: string
          description: Comma-separated lead statuses to include
      responses:
        "200":
          description: Recipient preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignRecipientsResponse"

  # ─── Sequences ───────────────────────────────────────────────────────────────
  /sequences:
    get:
      operationId: listSequences
      tags: [sequences]
      summary: List all nurture sequences
      responses:
        "200":
          description: List of sequences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sequence"
    post:
      operationId: createSequence
      tags: [sequences]
      summary: Create a nurture sequence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSequenceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sequence"

  /sequences/{id}:
    get:
      operationId: getSequence
      tags: [sequences]
      summary: Get a sequence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sequence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sequence"
        "404":
          description: Not found
    patch:
      operationId: updateSequence
      tags: [sequences]
      summary: Update a sequence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSequenceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sequence"
    delete:
      operationId: deleteSequence
      tags: [sequences]
      summary: Delete a sequence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sequences/{id}/enrollments:
    get:
      operationId: listSequenceEnrollments
      tags: [sequences]
      summary: List enrollments for a sequence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SequenceEnrollment"

  /sequences/enrolled-lead-ids:
    get:
      operationId: getEnrolledLeadIds
      tags: [sequences]
      summary: Get lead IDs enrolled in active sequences (not completed)
      responses:
        "200":
          description: Array of lead IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /leads/{leadId}/sequence-enrollments:
    get:
      operationId: getLeadSequenceEnrollments
      tags: [sequences]
      summary: Get sequence enrollments for a lead
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead sequence enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadSequenceEnrollment"

  /admin/sequences/process:
    post:
      operationId: processSequences
      tags: [admin]
      summary: Manually trigger sequence processing (admin only)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Processing result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessSequencesResponse"
        "401":
          description: Unauthorized

  # ─── Backlinks ────────────────────────────────────────────────────────────────
  /backlinks:
    get:
      operationId: listBacklinks
      tags: [backlinks]
      summary: List backlink opportunities
      parameters:
        - name: websiteId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of backlink opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Backlink"
    post:
      operationId: createBacklink
      tags: [backlinks]
      summary: Add a backlink opportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBacklinkBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backlink"

  /backlinks/{id}:
    patch:
      operationId: updateBacklink
      tags: [backlinks]
      summary: Update a backlink opportunity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBacklinkBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backlink"
    delete:
      operationId: deleteBacklink
      tags: [backlinks]
      summary: Delete a backlink
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Leads ────────────────────────────────────────────────────────────────────
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads
      parameters:
        - name: websiteId
          in: query
          schema:
            type: integer
        - name: campaignId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Conversations ────────────────────────────────────────────────────────────
  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create or return existing conversation (idempotent by leadId)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "200":
          description: Existing conversation returned (when leadId already has one)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "201":
          description: New conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [conversations]
      summary: Get messages for a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationMessage"
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a user message and get AI reply
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: User and assistant messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"

  /conversations/{id}/summarize:
    post:
      operationId: summarizeConversation
      tags: [conversations]
      summary: Summarize conversation and save qualification notes to lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Summary and updated lead notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeConversationResponse"

  # ─── Analytics / Dashboard ────────────────────────────────────────────────────
  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Overall dashboard summary counts
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/website/{id}:
    get:
      operationId: getWebsiteAnalytics
      tags: [analytics]
      summary: Per-website analytics breakdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Website analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebsiteAnalytics"

  /analytics/campaigns:
    get:
      operationId: getCampaignAnalytics
      tags: [analytics]
      summary: Campaign performance overview
      responses:
        "200":
          description: Campaign analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignAnalytics"

  /analytics/leads-funnel:
    get:
      operationId: getLeadsFunnel
      tags: [analytics]
      summary: Lead conversion funnel data
      responses:
        "200":
          description: Leads funnel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsFunnel"

  # ─── SEO Audits ───────────────────────────────────────────────────────────────
  /websites/{id}/audit:
    post:
      operationId: runSeoAudit
      tags: [websites]
      summary: Run a full SEO audit on a website URL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SEO Audit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeoAudit"
        "404":
          description: Website not found
        "500":
          description: Crawl or AI error

  /websites/{id}/audits:
    get:
      operationId: listSeoAudits
      tags: [websites]
      summary: List audit history for a website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of SEO audits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeoAudit"

  /websites/{id}/link-suggestions:
    get:
      operationId: listLinkSuggestions
      tags: [websites]
      summary: List saved internal link suggestions for a website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of link suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinkSuggestion"
        "404":
          description: Website not found
    post:
      operationId: generateLinkSuggestions
      tags: [websites]
      summary: Generate AI-powered internal link suggestions from latest audit data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated link suggestions (saved to DB)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinkSuggestion"
        "404":
          description: Website not found or no audit data available
        "503":
          description: AI provider error

