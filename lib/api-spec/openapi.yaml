components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Website ─────────────────────────────────────────────────────────────
    Website:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        niche:
          type: string
        seoScore:
          type: ["integer", "null"]
        status:
          type: string
          description: active | inactive
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - url
        - niche
        - status
        - createdAt
        - updatedAt

    CreateWebsiteBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
          description: Auto-inferred from URL if not provided
        url:
          type: string
        niche:
          type: ["string", "null"]
          description: Auto-inferred from URL if not provided
        seoScore:
          type: ["integer", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
      required:
        - url
        - status

    UpdateWebsiteBody:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        niche:
          type: string
        seoScore:
          type: ["integer", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]

    # ─── Keyword ─────────────────────────────────────────────────────────────
    Keyword:
      type: object
      properties:
        id:
          type: integer
